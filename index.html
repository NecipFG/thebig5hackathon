<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <title>DM1 Ay Haritası - 3D Görüntüleyici</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.110/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.110/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        #cesiumContainer { width: 100%; height: 100vh; }
        #menu { position: absolute; top: 10px; left: 10px; z-index: 1; background: rgba(0,0,0,0.7); color: white; padding: 15px; border-radius: 8px; font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="menu">
        <h3>DM1 Ay İstasyonu</h3>
        <p>Sol tık: Nokta koy / Mesafe ölç</p>
        <div id="distanceLabel">Mesafe: 0 km</div>
    </div>

    <div id="cesiumContainer"></div>

    <script>
        // 2. KISIM: Ay Ayarları ve Başlatma
        // Ücretsiz Cesium Ion hesabından token alıp buraya yapıştırman lazım kaptan!
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIyNWM1YWIzNy02YmUyLTRkMjUtYmU4OS1mYjQ3YTcwMGMzYzEiLCJpZCI6NDEwMzc5LCJpYXQiOjE3NzQ2OTQyMDJ9.gc-_vn-PqhEgaq95kLNxNa2JlUTKywxxj7MhssK1J6s';

        const viewer = new Cesium.Viewer('cesiumContainer', {
            // Ay için dünya atmosferini ve ışığını kapatıyoruz
            skyAtmosphere: false,
            baseLayerPicker: false,
            // Ay'ın gerçek şeklini (Ellipsoid) tanımlıyoruz
            globe: new Cesium.Globe(Cesium.Ellipsoid.LUNAR) 
        });

        // 3. KISIM: NASA Verilerini Ekleme
        // Not: .tif dosyalarını bir sunucuya (GeoServer vb.) yükleyip URL'sini buraya yazmalısın.
        // Şimdilik örnek bir katman yapısı:
        /*
        const nazaKatmani = viewer.imageryLayers.addImageryProvider(
            new Cesium.WebMapServiceImageryProvider({
                url : 'http://localhost:8080/geoserver/wms', // Yerel sunucun
                layers : 'DM1_final_adj_5mpp_surf'
            })
        );
        */

        // 4. KISIM: Mesafe Ölçme Algoritması
        let ilkNokta = null;
        let mesafeLabel = document.getElementById('distanceLabel');

        const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
        handler.setInputAction(function(movement) {
            const pickRay = viewer.camera.getPickRay(movement.position);
            const position = viewer.scene.globe.pick(pickRay, viewer.scene);

            if (Cesium.defined(position)) {
                if (!ilkNokta) {
                    // İlk tıklama: Noktayı oluştur
                    ilkNokta = position;
                    viewer.entities.add({
                        position: position,
                        point: { pixelSize: 12, color: Cesium.Color.YELLOW, outlineColor: Cesium.Color.BLACK, outlineWidth: 2 }
                    });
                } else {
                    // İkinci tıklama: Çizgi çek ve hesapla
                    const mesafe = Cesium.Cartesian3.distance(ilkNokta, position);
                    mesafeLabel.innerText = "Mesafe: " + (mesafe / 1000).toFixed(3) + " km";
                    
                    viewer.entities.add({
                        polyline: {
                            positions: [ilkNokta, position],
                            width: 3,
                            material: Cesium.Color.RED
                        }
                    });
                    ilkNokta = null; // Sıfırla ki yeni ölçüm yapılabilsin
                }
            }
        }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

    </script>
</body>
</html>
